name: Deploy to Server

on:
  workflow_run:
    workflows: ["Build & Release Binary"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download binary from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest --repo ${{ github.repository }} --pattern shade-backend-linux --dir /tmp --clobber
          chmod +x /tmp/shade-backend-linux

      - name: Deploy and restart
        run: |
          set -euo pipefail
          mv /tmp/shade-backend-linux /opt/shade/shade-backend
          chmod +x /opt/shade/shade-backend
          sudo systemctl restart shade-backend
          sleep 3
          systemctl is-active shade-backend
          echo "Deploy complete"

      - name: Notify Slack on success
        if: success()
        run: |
          COMMIT_MSG=$(echo '${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message }}' | head -1)
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          REPO="${{ github.repository }}"
          curl -sf -X POST '${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"Shade backend deployed successfully :rocket:\n\`${SHORT_SHA}\` ${COMMIT_MSG}\nhttps://github.com/${REPO}/commit/${COMMIT_SHA}\"}"

      - name: Notify Slack on failure
        if: failure()
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST '${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"Shade backend deploy failed :x:\n\`${SHORT_SHA}\` — <${RUN_URL}|View logs>\"}"
