name: Build & Release Binary

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "packages/**"
      - "shade"
      - ".github/workflows/deploy-binary.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: |
          ./shade build backend
          # Cross-compile for Linux x64 (for remote servers)
          bun build backend/src/index.ts \
            --compile \
            --target=bun-linux-x64 \
            --external passport-local-mongoose \
            --external @anthropic-ai/claude-agent-sdk \
            --outfile dist/shade-backend-linux

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            dist/shade-backend-linux
          prerelease: false
          make_latest: true
          body: |
            Automated build from ${{ github.sha }}
