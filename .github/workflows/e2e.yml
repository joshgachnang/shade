name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      PORT: 4020
      MONGO_URI: mongodb://localhost:27017/shade-test
      TOKEN_SECRET: test-secret-for-ci
      REFRESH_TOKEN_SECRET: test-refresh-secret-for-ci
      EXPO_PUBLIC_API_URL: http://localhost:4020

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Install Playwright
        run: bun add -d @playwright/test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build frontend for E2E
        run: cd frontend && bun run build:web
        env:
          # Bake SKIP_FONT_WAIT into the bundle so the app renders without
          # waiting for fonts, which are slow to load from the CI static server.
          EXPO_PUBLIC_SKIP_FONT_WAIT: "true"

      - name: Verify API URL in bundle
        run: |
          echo "Checking if localhost:4020 is in the bundle..."
          if grep -r "localhost:4020" frontend/dist/ --include="*.js" > /dev/null 2>&1; then
            echo "✓ localhost:4020 found in bundle"
          else
            echo "✗ localhost:4020 NOT found in bundle!"
            grep -r "baseUrl\|localhost:3000\|localhost:8082" frontend/dist/ --include="*.js" | head -5 || true
          fi

      - name: Start backend
        run: cd backend && nohup bun run start > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: |
          echo "Waiting for backend on port 4020..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4020/openapi.json > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 60 seconds"
          exit 1

      - name: Run Playwright tests
        run: bunx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_STATIC: true

      - name: Print backend logs
        if: ${{ !cancelled() }}
        run: cat /tmp/backend.log || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 14
